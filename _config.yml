# Local project configuration. The base configuration is loaded from the
# unaltraweb core gem by Makefile using: core/_config.yml,_config.yml

title: unaltreselfie
description: >
  Demo personal academic website built with unaltraweb.
keywords: academic website, research, jekyll
copyright_holder: dosquartsdedocs

author:
  name: John Doe
  name_es: Juan Nadie
  name_ca: Joan Ningu
  bio: Fictional researcher placeholder for a personal academic site.
  bio_es: Perfil investigador ficticio para una web académica personal.
  bio_ca: Perfil investigador fictici per a una web acadèmica personal.
  affiliation: Example University
  affiliation_es: Universidad de Ejemplo
  affiliation_ca: Universitat d'Exemple
  location: Example City
  location_es: Ciudad de Ejemplo
  location_ca: Ciutat d'Exemple
  email: researcher@example.org
  orcid: 0000-0002-1825-0097
  google_scholar: demo
  github: dosquartsdedocs
  linkedin: john-doe-demo

lang: en
default_lang: en
languages: [en, es, ca]
icon: "brand/dosquartsdedocs-logo-white.svg"

url: "https://dosquartsdedocs.github.io"
baseurl: "/unaltraweb-template"

theme: unaltraweb

plugins:
  - unaltraweb
  - jekyll-3rd-party-libraries
  - jekyll-archives-v2
  - jekyll-cache-bust
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll-regex-replace
  - jekyll/scholar
  - jekyll-sitemap
  - jekyll-socials
  - jekyll-tabs
  - jekyll-toc
  - jekyll-twitter-plugin
  - jemoji

external_sources: []

pagination:
  enabled: true
  collection: posts
  per_page: 4
  permalink: /page/:num/
  title: ":title"
  title_suffix: ""
  sort_field: date
  sort_reverse: true
  trail:
    before: 2
    after: 2

unaltraweb:
  site_profile: unaltreselfie
  features:
    news: true
    blog: true
    cv: true
    projects: true
    publications: true
    readings: true
    metrics: true
    manual: true
  manual:
    collection: chapters
    cover_image: /assets/img/manual-cover-cat.png
    logo: /assets/img/brand/dosquartsdedocs-logo.svg
    logo_inverse: /assets/img/brand/dosquartsdedocs-logo-white.svg
  documentation:
    collection: documentation
    logo: /assets/img/brand/dosquartsdedocs-logo.svg
    logo_inverse: /assets/img/brand/dosquartsdedocs-logo-white.svg
    logo_sepia: /assets/img/brand/dosquartsdedocs-logo.svg
    profiles:
      - id: github-publishers
        label: GitHub publishers
      - id: local-editors
        label: Local editors
      - id: site-designers
        label: Site designers
      - id: template-maintainers
        label: Template maintainers
  readings:
    badges:
      finished:
        label_en: Finished
        label_es: Finalizada
        label_ca: Finalitzada
        color: "#72d6a2"
        text_color: "#143125"
      reading:
        label_en: Reading now
        label_es: En lectura
        label_ca: En lectura
        color: "#ffd166"
        text_color: "#3a2a07"
      queued:
        label_en: To read
        label_es: Por leer
        label_ca: Per llegir
        color: "#b8a3ff"
        text_color: "#251c45"
      urv-teacher:
        label_en: URV teacher
        label_es: Profesorado URV
        label_ca: Professorat URV
        color: "#72d6a2"
        text_color: "#143125"
      crai:
        label_en: Available at CRAI
        label_es: Disponible en el CRAI
        label_ca: Disponible al CRAI
        color: "#79b7ff"
        text_color: "#102a44"
      classic:
        label_en: A classic
        label_es: Un clásico
        label_ca: Un clàssic
        color: "#ffd166"
        text_color: "#3a2a07"
  figure_captions:
    enabled: true
    collections: [chapters, documentation]

giscus:
  repo: dosquartsdedocs/unaltraweb-template
