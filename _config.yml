# Local project configuration. The base configuration is loaded from the
# unaltraweb core gem by Makefile using: core/_config.yml,_config.yml

title: Roger Tomlinson
description: >
  Demo personal academic website built with unaltraweb.
footer_text: >
  Powered by <a href="https://github.com/dosquartsdedocs/unaltraweb">unaltraweb</a>.
keywords: academic website, research, jekyll

author:
  name: Roger Tomlinson
  bio: Geographer and pioneer of geographic information systems. Demo profile for a personal academic site.
  affiliation: Canada Geographic Information System
  location: Ottawa, Canada
  email: researcher@example.org
  orcid: 0000-0002-1825-0097
  google_scholar: demo
  github: dosquartsdedocs
  linkedin: roger-tomlinson-demo

lang: en
default_lang: en
languages: [en, es, ca]
icon: "🧭"

url: "https://dosquartsdedocs.github.io"
baseurl: "/unaltraweb-template"

theme: unaltraweb

plugins:
  - unaltraweb
  - jekyll-3rd-party-libraries
  - jekyll-archives-v2
  - jekyll-cache-bust
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll-regex-replace
  - jekyll/scholar
  - jekyll-sitemap
  - jekyll-socials
  - jekyll-tabs
  - jekyll-toc
  - jekyll-twitter-plugin
  - jemoji

external_sources: []

pagination:
  enabled: true
  collection: posts
  per_page: 4
  permalink: /page/:num/
  title: ":title - page :num"
  sort_field: date
  sort_reverse: true
  trail:
    before: 2
    after: 2

unaltraweb:
  site_profile: personal
  features:
    blog: true
    cv: true
    projects: true
    publications: true
    metrics: true
    manual: true
  manual:
    collection: chapters
    cover_image: /assets/img/manual-cover-cat.png
    logo: /assets/img/brand/dosquartsdedocs-logo.svg
    logo_inverse: /assets/img/brand/dosquartsdedocs-logo-white.svg
  figure_captions:
    enabled: true
    collections: [chapters]

giscus:
  repo: dosquartsdedocs/unaltraweb-template
