name: Update publication metrics

on:
  workflow_dispatch:
    inputs:
      fetch_scimago:
        description: Download/update the local Scimago CSV cache before updating metrics.
        required: false
        type: boolean
        default: false
      offline:
        description: Do not call OpenAlex or Crossref; use local data only.
        required: false
        type: boolean
        default: false
      dry_run:
        description: Avoid rewriting BibTeX entries. Summary and diagnostics are still written.
        required: false
        type: boolean
        default: false
      strict_external:
        description: Fail the workflow when OpenAlex or Crossref requests fail.
        required: false
        type: boolean
        default: true
      require_scimago:
        description: Fail when the local Scimago CSV is unavailable.
        required: false
        type: boolean
        default: false
      create_pull_request:
        description: Open a pull request with generated metrics changes.
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  metrics:
    uses: dosquartsdedocs/unaltraweb/.github/workflows/metrics-update.yml@main
    with:
      fetch_scimago: ${{ inputs.fetch_scimago }}
      offline: ${{ inputs.offline }}
      dry_run: ${{ inputs.dry_run }}
      strict_external: ${{ inputs.strict_external }}
      require_scimago: ${{ inputs.require_scimago }}
      create_pull_request: ${{ inputs.create_pull_request }}
