<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Theme refactor flow</title>
  <desc id="desc">A flow diagram showing inherited components moving through review into unaltraweb components.</desc>
  <rect width="1200" height="800" fill="#eef4ef"/>
  <g fill="#ffffff" stroke="#5f8d6a" stroke-width="8">
    <rect x="95" y="270" width="260" height="180" rx="34"/>
    <rect x="470" y="270" width="260" height="180" rx="34"/>
    <rect x="845" y="270" width="260" height="180" rx="34"/>
  </g>
  <g fill="none" stroke="#2f7d4f" stroke-width="22" stroke-linecap="round" stroke-linejoin="round">
    <path d="M370 360h75"/>
    <path d="m430 320 45 40-45 40"/>
    <path d="M745 360h75"/>
    <path d="m805 320 45 40-45 40"/>
  </g>
  <g fill="#2d3748" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">
    <text x="225" y="365" font-size="40">inherit</text>
    <text x="600" y="365" font-size="40">review</text>
    <text x="975" y="365" font-size="40">own</text>
  </g>
  <g fill="#cfe0d3">
    <circle cx="225" cy="545" r="28"/>
    <circle cx="600" cy="545" r="28"/>
    <circle cx="975" cy="545" r="28"/>
  </g>
</svg>
