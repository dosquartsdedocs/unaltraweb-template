<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Template and core architecture</title>
  <desc id="desc">A simple architecture diagram showing a thin template connected to a reusable core.</desc>
  <rect width="1200" height="800" fill="#edf2f7"/>
  <rect x="120" y="180" width="340" height="440" rx="34" fill="#ffffff" stroke="#6b7c93" stroke-width="8"/>
  <rect x="740" y="180" width="340" height="440" rx="34" fill="#ffffff" stroke="#2d7fb8" stroke-width="8"/>
  <g fill="#dce6ee">
    <rect x="170" y="250" width="240" height="34" rx="8"/>
    <rect x="170" y="330" width="190" height="34" rx="8"/>
    <rect x="170" y="410" width="260" height="34" rx="8"/>
    <rect x="790" y="250" width="230" height="34" rx="8"/>
    <rect x="790" y="330" width="180" height="34" rx="8"/>
    <rect x="790" y="410" width="250" height="34" rx="8"/>
  </g>
  <path d="M480 400h230" fill="none" stroke="#2d7fb8" stroke-width="24" stroke-linecap="round"/>
  <path d="m690 340 70 60-70 60" fill="none" stroke="#2d7fb8" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  <g font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">
    <text x="290" y="130" fill="#2d3748" font-size="48">template</text>
    <text x="910" y="130" fill="#2d3748" font-size="48">core</text>
  </g>
</svg>
