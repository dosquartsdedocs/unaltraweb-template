<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">GIScience concept diagram</title>
  <desc id="desc">A layered conceptual diagram with nodes for space, place, scale, and uncertainty.</desc>
  <rect width="1200" height="800" fill="#f3efe3"/>
  <g opacity="0.55" fill="none" stroke="#8a7b52" stroke-width="4">
    <ellipse cx="600" cy="400" rx="420" ry="250"/>
    <ellipse cx="600" cy="400" rx="310" ry="175" transform="rotate(18 600 400)"/>
    <ellipse cx="600" cy="400" rx="235" ry="315" transform="rotate(-28 600 400)"/>
  </g>
  <g fill="#2b6f77">
    <circle cx="320" cy="310" r="54"/>
    <circle cx="680" cy="210" r="48"/>
    <circle cx="835" cy="455" r="58"/>
    <circle cx="485" cy="585" r="50"/>
  </g>
  <g fill="#ffffff" font-family="Arial, sans-serif" font-size="38" font-weight="700" text-anchor="middle">
    <text x="320" y="323">S</text>
    <text x="680" y="223">P</text>
    <text x="835" y="469">U</text>
    <text x="485" y="599">M</text>
  </g>
  <path d="M320 310 680 210 835 455 485 585 320 310" fill="none" stroke="#2b6f77" stroke-width="18" stroke-linejoin="round" opacity="0.35"/>
</svg>
