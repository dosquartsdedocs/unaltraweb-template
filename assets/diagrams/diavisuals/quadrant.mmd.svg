<svg id="my-svg" width="100%" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="max-width: 620px; background-color: white;" viewBox="0 0 620 460" role="graphics-document document" aria-roledescription="quadrantChart"><style>#my-svg{font-family:Latin Modern Sans,DejaVu Sans,Arial,sans-serif;font-size:13px;fill:#0F223A;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#my-svg .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#my-svg .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#my-svg .error-icon{fill:#F5FAFF;}#my-svg .error-text{fill:#0a0500;stroke:#0a0500;}#my-svg .edge-thickness-normal{stroke-width:1px;}#my-svg .edge-thickness-thick{stroke-width:3.5px;}#my-svg .edge-pattern-solid{stroke-dasharray:0;}#my-svg .edge-thickness-invisible{stroke-width:0;fill:none;}#my-svg .edge-pattern-dashed{stroke-dasharray:3;}#my-svg .edge-pattern-dotted{stroke-dasharray:2;}#my-svg .marker{fill:#2A5DB0;stroke:#2A5DB0;}#my-svg .marker.cross{stroke:#2A5DB0;}#my-svg svg{font-family:Latin Modern Sans,DejaVu Sans,Arial,sans-serif;font-size:13px;}#my-svg p{margin:0;}#my-svg .node .neo-node{stroke:#2A5DB0;}#my-svg [data-look="neo"].node rect,#my-svg [data-look="neo"].cluster rect,#my-svg [data-look="neo"].node polygon{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node path{stroke:url(#my-svg-gradient);stroke-width:1px;}#my-svg [data-look="neo"].node .outer-path{filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node .neo-line path{stroke:#2A5DB0;filter:none;}#my-svg [data-look="neo"].node circle{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node circle .state-start{fill:#000000;}#my-svg [data-look="neo"].icon-shape .icon{fill:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].icon-shape .icon-neo path{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg .quadrants .quadrant text{font-size:13px!important;font-weight:600;}#my-svg .data-points .data-point text{font-size:11px!important;}#my-svg .labels .label text{font-size:12px!important;}#my-svg :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g/><g class="main"><g class="quadrants"><g class="quadrant"><rect x="323" y="82" width="255" height="155" fill="#FBE9DD"/><text x="0" y="0" fill="#8A4B1F" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(450.5, 87) rotate(0)">Plan milestones</text></g><g class="quadrant"><rect x="68" y="82" width="255" height="155" fill="#F7F3D9"/><text x="0" y="0" fill="#6F5E1A" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(195.5, 87) rotate(0)">Explain architecture</text></g><g class="quadrant"><rect x="68" y="237" width="255" height="155" fill="#F9E2E6"/><text x="0" y="0" fill="#7C2A46" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(195.5, 242) rotate(0)">Show file context</text></g><g class="quadrant"><rect x="323" y="237" width="255" height="155" fill="#E1F2E5"/><text x="0" y="0" fill="#1F6A37" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(450.5, 242) rotate(0)">Compare priorities</text></g></g><g class="border"><line x1="67" y1="82" x2="579" y2="82" style="stroke: rgb(17, 17, 17); stroke-width: 2;"/><line x1="578" y1="83" x2="578" y2="391" style="stroke: rgb(17, 17, 17); stroke-width: 2;"/><line x1="67" y1="392" x2="579" y2="392" style="stroke: rgb(17, 17, 17); stroke-width: 2;"/><line x1="68" y1="83" x2="68" y2="391" style="stroke: rgb(17, 17, 17); stroke-width: 2;"/><line x1="323" y1="83" x2="323" y2="391" style="stroke: rgb(17, 17, 17); stroke-width: 1;"/><line x1="69" y1="237" x2="577" y2="237" style="stroke: rgb(17, 17, 17); stroke-width: 1;"/></g><g class="data-points"><g class="data-point"><circle cx="414.8" cy="280.4" r="5" fill="#111111" stroke="#111111" stroke-width="0px"/><text x="0" y="0" fill="#111111" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(414.8, 288.4) rotate(0)">Quadrant</text></g><g class="data-point"><circle cx="506.59999999999997" cy="199.8" r="5" fill="#111111" stroke="#111111" stroke-width="0px"/><text x="0" y="0" fill="#111111" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(506.59999999999997, 207.8) rotate(0)">Gantt plan</text></g><g class="data-point"><circle cx="455.6" cy="131.60000000000002" r="5" fill="#111111" stroke="#111111" stroke-width="0px"/><text x="0" y="0" fill="#111111" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(455.6, 139.60000000000002) rotate(0)">Timeline</text></g><g class="data-point"><circle cx="282.2" cy="181.2" r="5" fill="#111111" stroke="#111111" stroke-width="0px"/><text x="0" y="0" fill="#111111" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(282.2, 189.2) rotate(0)">Class model</text></g><g class="data-point"><circle cx="180.2" cy="299" r="5" fill="#111111" stroke="#111111" stroke-width="0px"/><text x="0" y="0" fill="#111111" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(180.2, 307) rotate(0)">File tree</text></g></g><g class="labels"><g class="label"><text x="0" y="0" fill="#0F223A" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(195.5, 439) rotate(0)">Static structure</text></g><g class="label"><text x="0" y="0" fill="#0F223A" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(450.5, 439) rotate(0)">Time dependent</text></g><g class="label"><text x="0"