name: unaltraweb-template

services:
  jekyll:
    container_name: unaltraweb-template-jekyll
    image: ${DOCKER_IMAGE:-ghcr.io/dosquartsdedocs/unaltraweb:main}
    working_dir: /srv/jekyll
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    ports:
      - 4000:4000
      - 35729:35729
    volumes:
      - .:/srv/jekyll
    environment:
      HOME: /tmp
      JEKYLL_ENV: development
    command: bash -lc 'make serve-native HOST=0.0.0.0 PORT=4000'
